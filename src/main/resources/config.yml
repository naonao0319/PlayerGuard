protection:
  # 保護できる総体積の上限（プレイ日数に応じた段階制）。
  #   キー = プレイ日数(0以上の整数), 値 = その日数以降の上限体積。
  #   プレイヤーのプレイ日数「以下」で最も近いキーが採用される。
  #   例) キーが 0/1/2 のみで7日目のプレイヤー → キー2の値が適用される。
  # 各値は自由に変更してよい。
  # 8日目以降の上限を増やしたい場合は、下に "8: 110000" のように行を追加するだけで効く。
  limit:
    0: 30000    # プレイ0日目以降（初日）
    1: 40000    # プレイ1日目以降
    2: 50000    # プレイ2日目以降
    3: 60000    # プレイ3日目以降
    4: 70000    # プレイ4日目以降
    5: 80000    # プレイ5日目以降
    6: 90000    # プレイ6日目以降
    7: 100000   # プレイ7日目以降（以降は新しいキーを追記すると拡張できる）

  flags:
    break: true
    place: true
    interact: true
    pvp: true
    entity-damage: true
    entry: true
    pistons: true
    explosion: true
    fire: true
    mob-spawning: true
    item: true
    environment: true

  spacing:
    min-spacing-between-regions: 0
    apply-to-same-player-s-region: false

visitor-log:
  enabled: true
  max-entries-per-region: 100
  flush-interval-seconds: 60
  target: visitors-only
  events:
    enter-exit: true
    break: true
    place: true
    interact: true
  permissions:
    allow-subowner-view: true
    allow-builder-view: false

permissions:
  allow-subowner-transfer: false
  allow-subowner-disclaim: false
