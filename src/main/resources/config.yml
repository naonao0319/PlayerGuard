protection:
  limit:
    0: 30000
    1: 40000

  flags:
    break: true
    place: true
    interact: true
    pvp: true
    entity-damage: true
    entry: true
    pistons: true
    explosion: true
    fire: true
    mob-spawning: true
    item: true
    environment: true

  spacing:
    min-spacing-between-regions: 0
    apply-to-same-player-s-region: false

visitor-log:
  enabled: true
  max-entries-per-region: 100
  flush-interval-seconds: 60
  target: visitors-only
  events:
    enter-exit: true
    break: true
    place: true
    interact: true
  permissions:
    allow-subowner-view: true
    allow-builder-view: false

permissions:
  allow-subowner-transfer: false
  allow-subowner-disclaim: false
